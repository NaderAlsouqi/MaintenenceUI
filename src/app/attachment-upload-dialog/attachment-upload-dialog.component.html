<h2>إضافة مرفقات</h2>
<form (ngSubmit)="uploadFile()">
  <mat-form-field>
    <input matInput type="file" accept=".pdf, .csv, .jpg, .jpeg, .png" (change)="onFileSelected($event)" />
  </mat-form-field>

  <mat-form-field>
    <input matInput placeholder="ملاحظة" name="description" [(ngModel)]="attachmentDto.description" />
  </mat-form-field>

  <div>
    <button mat-raised-button type="submit"  [mat-dialog-close]="false" style="margin-right: 10px;">حفظ</button>
    <button mat-raised-button type="button" (click)="closeDialog()">إالغاء</button>
  </div>
</form>
