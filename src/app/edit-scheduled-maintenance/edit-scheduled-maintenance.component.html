<div class="dialog-container" dir="rtl">
  <!-- Premium Header -->
  <div class="dialog-header-premium">
    <div class="d-flex align-items-center">
      <div class="icon-box">
        <mat-icon>edit_calendar</mat-icon>
      </div>
      <div class="ms-3">
        <h2 class="dialog-title">تعديل الصيانة الدورية</h2>
        <p class="dialog-subtitle">تحديث بيانات موعد الصيانة الدورية</p>
      </div>
    </div>
    <button mat-icon-button class="close-btn" [mat-dialog-close]="false">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <!-- Form Content -->
  <div class="dialog-content">
    <form [formGroup]="editScheduledForm" (ngSubmit)="onSubmit()">
      <!-- Hidden ID -->
      <input type="hidden" formControlName="id" [value]="schedul.id">

      <div class="row g-3">
        <!-- Maintenance Date -->
        <div class="col-md-6">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>تاريخ الصيانة</mat-label>
            <input matInput [value]="schedul.maintenanceDate | date:'dd/MM/yyyy'" formControlName="maintenanceDate"
              disabled="true" readonly="true">
            <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
            <mat-icon matPrefix>event</mat-icon>
          </mat-form-field>
        </div>

        <!-- Request ID -->
        <div class="col-md-6">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>رقم طلب الصيانة</mat-label>
            <input formControlName="intro_id" matInput [value]="schedul.intro_id">
            <mat-icon matSuffix>tag</mat-icon>
          </mat-form-field>
        </div>

        <!-- Customer Selection -->
        <div class="col-12">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>اسم العميل</mat-label>
            <input [value]="schedul.customerName" readonly="true" #customerInput type="text" placeholder="العميل"
              matInput formControlName="CustomersNum" [matAutocomplete]="CustomerAuto">
            <mat-autocomplete autoActiveFirstOption #CustomerAuto="matAutocomplete" class="customer-autocomplete">
              <mat-option *ngFor="let option of CustomerFilteredOptions | async" [value]="option.customersNum">
                <div class="customer-option">
                  <mat-icon>person</mat-icon>
                  <div class="customer-details">
                    <span class="customer-name">{{ option.customerName }}</span>
                    <span class="customer-phone">{{ option.customersNum }}</span>
                  </div>
                </div>
              </mat-option>
            </mat-autocomplete>
            <mat-icon matSuffix>person</mat-icon>
          </mat-form-field>
        </div>

        <!-- Status Selection -->
        <div class="col-12">
          <div class="status-section">
            <label class="status-label">
              <mat-icon class="label-icon">assignment_turned_in</mat-icon>
              حالة الصيانة:
            </label>
            <mat-radio-group formControlName="status" (change)="onStatusChange($event)" class="status-options">
              <mat-radio-button *ngFor="let status of MStatus" [value]="status" color="primary" class="status-radio"
                [checked]="schedul.status === '0' ? status === 'تم تحويل الطلب' : status === 'لم يتم تحويل الطلب'">
                {{ status }}
              </mat-radio-button>
            </mat-radio-group>
          </div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="dialog-actions">
        <button mat-button type="button" [mat-dialog-close]="false" class="btn-modern btn-light">
          <mat-icon>close</mat-icon>
          إلغاء
        </button>
        <button mat-raised-button color="primary" type="submit" class="btn-modern btn-primary"
          [mat-dialog-close]="false">
          <mat-icon>save</mat-icon>
          حفظ التعديلات
        </button>
      </div>
    </form>
  </div>
</div>
