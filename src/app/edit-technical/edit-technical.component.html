

<div  mat-dialog-title>
    <div id="grad1" class="card-heading">
      <h2 class="title">     سائقين/الفنيين
  
      </h2>
      </div> 
   
  </div>
  <div class="registration-form m-3 p-4">
    <form  [formGroup]="editTechnicalForm" dir="rtl" (ngSubmit)="onSubmit()">
  
    
      <div class="row">
        <input type="hidden" formControlName="driver_ID" matInput [value]="technical.driver_ID">

       
  
        <div class="col-md-4">
         <mat-form-field appearance="outline" dir="rtl">
          <mat-label >رقم السائق/الفن </mat-label>
          <input formControlName="num_Driver" matInput placeholder="رقم السائق /الفني "[value]="technical.num_Driver">
          <mat-icon matSuffix>format_list_numbered</mat-icon>
        </mat-form-field>
        </div> 
  
        <div class="col-md-4">
          <mat-form-field appearance="outline" dir="rtl">
           <mat-label >اسم السائق /الفني</mat-label>
           <input formControlName="name_Driver" matInput placeholder="اسم السائق /الفني"[value]="technical.name_Driver">
           <mat-icon matSuffix>person</mat-icon>
         </mat-form-field>
         </div> 
         <div class="col-md-4">
          <mat-form-field appearance="outline" dir="rtl">
           <mat-label > السائق /الفني</mat-label>
           <mat-select formControlName="driv" >
            <mat-option *ngFor="let driv of technicalList"  [value]="driv">{{driv}}</mat-option>
           </mat-select>
           <mat-icon matSuffix>phone</mat-icon>
         </mat-form-field>
         </div> 
         


         <div class="col-md-4">
          <mat-form-field appearance="outline" dir="rtl">
           <mat-label > العنوان</mat-label>
           <input formControlName="address" matInput placeholder="العنوان  " [value]="technical.address">
           <mat-icon matSuffix>location_on</mat-icon>
         </mat-form-field>
         </div> 
         <div class="col-md-4">
          <mat-form-field appearance="outline" dir="rtl">
           <mat-label >  ملاحظات </mat-label>
           <textarea formControlName="disc" matInput [value]="technical.disc"></textarea>
           <mat-icon matSuffix>note</mat-icon>
         </mat-form-field>
         </div> 
        
         <div class="col-md-12 d-flex align-items-center">
          <mat-radio-group aria-label="Select an option" class="emat-mdc-radio-button" formControlName="Driver_Status" (change)="onEmergencyStatusChange($event)">
            <label id="example-radio-group-label" class="mr-2"  >  حالة العميل  :&nbsp;  </label>

            <mat-radio-button class="example-radio-button" *ngFor="let status of Driver_Statuss" [value]="status.value" [checked]="technical.driver_Status == status.value" >
              <span class="mr-2">{{status.name}} &nbsp;</span>
            </mat-radio-button>
          </mat-radio-group>
        </div>

        
          
  
          <div mat-dialog-actions class="action">
            <button mat-raised-button color="primary" type="submit"  [mat-dialog-close]="false">تعديل</button>
            <button mat-raised-button type="button" [mat-dialog-close]="false"><mat-icon matSuffix>keyboard_backspace</mat-icon>  رجوع  </button>

          </div>
  
  
  
      </div>
   </form>
  </div>
