                    <div class="card-body">
                        <div class="table-responsive">
                          
        <div class="mat-elevation-z8"   >
          <mat-form-field appearance="outline" dir="rtl">
            <mat-label>بحث</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="مثال :اسم البنك" #input>
          </mat-form-field>
  
          <table mat-table [dataSource]="dataSource" matSort >
        
        
            <!-- delegateName Column -->
            <ng-container matColumnDef="deviceID">
              <th mat-header-cell *matHeaderCellDef mat-sort-header> اسم المندوب </th>
              <td mat-cell *matCellDef="let row"> {{row.deviceID}} </td>
            </ng-container>
        
        
        
         <!-- Phone Column -->
         <ng-container matColumnDef="customersNum">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> رقم هاتف المندوب </th>
          <td mat-cell *matCellDef="let row"> {{row.customersNum}} </td>
        </ng-container>
        
        
         <!-- Phone Column -->
         <ng-container matColumnDef="deviceType">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> رقم المول  </th>
          <td mat-cell *matCellDef="let row"> {{row.deviceType}} </td>
        </ng-container>
        
        
        <!--  Administrator -->
        <ng-container matColumnDef="customers_FName">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>المسؤول </th>
          <td mat-cell *matCellDef="let row"> {{row.customers_FName}} </td>
        </ng-container>
        <!-- moles Status -->
        <ng-container matColumnDef="deviceSR">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>اسم المولات </th>
          <td mat-cell *matCellDef="let row"> {{row.deviceSR}} </td>
        </ng-container>
         <!-- Action Column -->
      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>  </th>
        <td mat-cell *matCellDef="let row">
          
          <button mat-icon-button  (click)="OpenEditRepresentativeDialog(row)" class="mx-2" color="primary"><i class="fa fa-pencil"
              aria-hidden="true"></i></button>
              
              <button mat-icon-button (click)="viewRepresentative(row)"  class="mx-2" color="accent"><i class="fa fa-eye"
                aria-hidden="true"></i></button>

          <button (click)="openDeleteDialog(row.id)" mat-icon-button color="warn"><i class="fa fa-trash"
              aria-hidden="true"></i></button>
        </td>
      </ng-container>  
  
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  
       <!-- Row shown when there is no matching data. -->
       <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="4">No data matching the filter "{{input.value}}"</td>
      </tr>
      </table>
      <div  dir="rtl">
    <mat-paginator  [pageSizeOptions]="[5,10, 25, 100]" aria-label="Select page of users"   appearance="outline" dir="rtl"></mat-paginator>
  </div>
  </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
  </div>




  
<ng-template #DeviceDeleteDialog dir="rtl">
  <h2>هل أنت متأكد من عملية الحذف لهذا المندوب</h2>
  <mat-dialog-actions align="end">
