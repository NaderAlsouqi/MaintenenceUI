<div class="dialog-container" dir="rtl">
    <div class="dialog-header-premium">
        <div class="d-flex align-items-center">
            <div class="dialog-icon-box">
                <mat-icon>{{ isEditMode ? 'edit' : 'add_circle' }}</mat-icon>
            </div>
            <div class="ms-3">
                <h2 class="dialog-title">{{ isEditMode ? 'تعديل ضريبة' : 'إضافة ضريبة جديدة' }}</h2>
                <p class="dialog-subtitle">تعريف بيانات الضريبة في النظام</p>
            </div>
        </div>
        <button mat-icon-button class="close-btn" (click)="onCancel()">
            <mat-icon>close</mat-icon>
        </button>
    </div>

    <div class="dialog-content">
        <form [formGroup]="taxForm" (ngSubmit)="onSubmit()">
            <div class="row g-3">
                <div class="col-12">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>اسم الضريبة</mat-label>
                        <input matInput formControlName="taxName" placeholder="مثال: ضريبة القيمة المضافة">
                        <mat-error *ngIf="taxForm.get('taxName')?.hasError('required')">اسم الضريبة مطلوب</mat-error>
                    </mat-form-field>
                </div>

                <div class="col-12">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>قيمة الضريبة</mat-label>
                        <input matInput type="number" formControlName="taxValue">
                        <mat-error *ngIf="taxForm.get('taxValue')?.hasError('required')">القيمة مطلوبة</mat-error>
                        <mat-error *ngIf="taxForm.get('taxValue')?.hasError('min')">القيمة يجب أن تكون موجبة</mat-error>
                    </mat-form-field>
                </div>

                <div class="col-12 mt-2">
                    <mat-checkbox formControlName="isPercentage" color="primary">نسبة مئوية (%)</mat-checkbox>
                </div>
            </div>

            <div class="dialog-actions mt-4">
                <button mat-button type="button" (click)="onCancel()" class="btn-modern btn-light">
                    إلغاء
                </button>
                <button mat-raised-button color="primary" type="submit" [disabled]="taxForm.invalid"
                    class="btn-modern btn-primary">
                    <mat-icon>{{ isEditMode ? 'save' : 'add' }}</mat-icon>
                    {{ isEditMode ? 'تحديث' : 'حفظ' }}
                </button>
            </div>
        </form>
    </div>
</div>
