<div class="dialog-container" dir="rtl">
  <div class="dialog-header-premium">
    <div class="d-flex align-items-center">
      <div class="icon-box">
        <mat-icon>lock_reset</mat-icon>
      </div>
      <div class="ms-3">
        <h2 class="dialog-title">تغيير كلمة المرور</h2>
        <p class="dialog-subtitle">تحديث كلمة المرور الخاصة بحسابك</p>
      </div>
    </div>
    <button mat-icon-button class="close-btn" [mat-dialog-close]="false">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="dialog-content">
    <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
      <div class="row g-3">
        <!-- Old Password -->
        <div class="col-12">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>كلمة المرور القديمة</mat-label>
            <input matInput [type]="hideOld ? 'password' : 'text'" formControlName="oldPassword">
            <button mat-icon-button matSuffix (click)="hideOld = !hideOld" [attr.aria-label]="'Hide password'"
              [attr.aria-pressed]="hideOld" type="button">
              <mat-icon>{{hideOld ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            <mat-error *ngIf="passwordForm.get('oldPassword').hasError('required')">كلمة المرور القديمة
              مطلوبة</mat-error>
          </mat-form-field>
        </div>

        <!-- New Password -->
        <div class="col-12">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>كلمة المرور الجديدة</mat-label>
            <input matInput [type]="hideNew ? 'password' : 'text'" formControlName="newPassword">
            <button mat-icon-button matSuffix (click)="hideNew = !hideNew" [attr.aria-label]="'Hide password'"
              [attr.aria-pressed]="hideNew" type="button">
              <mat-icon>{{hideNew ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            <mat-error *ngIf="passwordForm.get('newPassword').hasError('required')">كلمة المرور الجديدة
              مطلوبة</mat-error>
            <mat-error *ngIf="passwordForm.get('newPassword').hasError('minlength')">يجب أن تتكون كلمة المرور من 6 أحرف
              على الأقل</mat-error>
          </mat-form-field>
        </div>

        <!-- Confirm New Password -->
        <div class="col-12">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>تأكيد كلمة المرور</mat-label>
            <input matInput [type]="hideConfirm ? 'password' : 'text'" formControlName="confirmPassword">
            <button mat-icon-button matSuffix (click)="hideConfirm = !hideConfirm" [attr.aria-label]="'Hide password'"
              [attr.aria-pressed]="hideConfirm" type="button">
              <mat-icon>{{hideConfirm ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            <mat-error *ngIf="passwordForm.hasError('mismatch')">كلمات المرور غير متطابقة</mat-error>
          </mat-form-field>
        </div>
      </div>

      <div class="dialog-actions mt-4">
        <button mat-button type="button" [mat-dialog-close]="false" class="btn-modern btn-light ms-2">إلغاء</button>
        <button mat-raised-button color="primary" type="submit" class="btn-modern btn-primary"
          [disabled]="!passwordForm.valid">
          <mat-icon class="ms-2">save</mat-icon>
          حفظ التغييرات
        </button>
      </div>
    </form>
  </div>
</div>
