<div class="dialog-container" dir="rtl">
    <!-- Dialog Header -->
    <div class="dialog-header">
        <div class="header-content">
            <div class="icon-wrapper">
                <mat-icon>store</mat-icon>
            </div>
            <h2>إضافة معرض جديد</h2>
        </div>
        <button class="close-btn" (click)="onCancel()">
            <mat-icon>close</mat-icon>
        </button>
    </div>

    <!-- Dialog Body -->
    <mat-dialog-content>
        <form [formGroup]="exhibitionForm" class="exhibition-form">
            <div class="form-row">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>اسم المعرض</mat-label>
                    <input matInput formControlName="exhibitionIDNmAr" placeholder="أدخل اسم المعرض">
                    <mat-icon matSuffix>storefront</mat-icon>
                    <mat-error *ngIf="exhibitionForm.get('exhibitionIDNmAr').hasError('required')">
                        اسم المعرض مطلوب
                    </mat-error>
                </mat-form-field>
            </div>

            <div class="form-row two-columns">
                <mat-form-field appearance="outline">
                    <mat-label>هاتف 1</mat-label>
                    <input matInput formControlName="mobile1" placeholder="رقم الهاتف الأول">
                    <mat-icon matSuffix>phone</mat-icon>
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label>هاتف 2</mat-label>
                    <input matInput formControlName="mobile2" placeholder="رقم الهاتف الثاني">
                    <mat-icon matSuffix>phone_android</mat-icon>
                </mat-form-field>
            </div>

            <div class="form-row">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>العنوان</mat-label>
                    <textarea matInput formControlName="address" placeholder="أدخل العنوان" rows="2"></textarea>
                    <mat-icon matSuffix>location_on</mat-icon>
                </mat-form-field>
            </div>
        </form>
    </mat-dialog-content>

    <!-- Dialog Actions -->
    <mat-dialog-actions align="start">
        <button class="btn-modern btn-outline" type="button" (click)="onCancel()">
            <mat-icon>close</mat-icon>
            <span>إلغاء</span>
        </button>
        <button class="btn-modern btn-primary" type="button" (click)="onSubmit()" [disabled]="!exhibitionForm.valid">
            <mat-icon>save</mat-icon>
            <span>حفظ المعرض</span>
        </button>
    </mat-dialog-actions>
</div>
